<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCode Go — Model Comparison</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-2: #242424;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-2: #a0a0a0;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --free: #f59e0b;
      --go: #10b981;
      --promo: #f43f5e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    header { margin-bottom: 32px; }
    h1 { font-size: 2rem; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
    p.lead { color: var(--text-2); margin: 0 0 24px; font-size: 1.05rem; }
    .toolbar {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 24px;
    }
    .toolbar input, .toolbar select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      min-width: 220px;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
    .toolbar label { color: var(--text-2); font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .card h2 { font-size: 1.15rem; font-weight: 600; margin: 0 0 16px; }
    .multiplier-control {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .multiplier-control span { color: var(--text-2); font-size: 0.9rem; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 999px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2);
      user-select: none; transition: all .15s ease;
    }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    th, td { padding: 12px; text-align: left; }
    th { color: var(--text-2); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { border-bottom: 1px solid var(--border); }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .model-name { font-weight: 600; }
    .provider { color: var(--text-2); font-size: 0.85rem; }
    .limit-cell { font-variant-numeric: tabular-nums; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600;
    }
    .badge-free { background: rgba(245,158,11,0.15); color: var(--free); }
    .badge-go { background: rgba(16,185,129,0.15); color: var(--go); }
    .badge-promo { background: rgba(244,63,94,0.15); color: var(--promo); }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 24px; }
    .chart-wrap { position: relative; height: 320px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px;
    }
    .stat-value { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
    .stat-label { color: var(--text-2); font-size: 0.85rem; margin-top: 4px; }
    .highlight { color: var(--accent); }
    .note { color: var(--text-2); font-size: 0.85rem; margin-top: 8px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    @media (max-width: 640px) {
      .charts-grid { grid-template-columns: 1fr; }
      .toolbar input, .toolbar select { min-width: 100%; }
      table { font-size: 0.85rem; }
      th, td { padding: 10px 8px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const MULTIPLIERS = [1, 5, 10, 25, 50, 100];

    const MODELS = [
      { id: 'big-pickle', name: 'Big Pickle', provider: 'OpenCode', category: 'Free', freeLimit: 200, goLimit: null, bestFor: 'General coding assistance', note: null },
      { id: 'glm-5.1', name: 'GLM-5.1', provider: 'Zhipu AI', category: 'Chat', freeLimit: null, goLimit: 880, bestFor: 'Reasoning, Chinese language tasks', note: null },
      { id: 'glm-5', name: 'GLM-5', provider: 'Zhipu AI', category: 'Chat', freeLimit: null, goLimit: null, bestFor: 'General chat, multilingual reasoning', note: 'Included in Go; limit not shown on pricing page' },
      { id: 'kimi-k2.6', name: 'Kimi K2.6', provider: 'Moonshot', category: 'Chat', freeLimit: null, goLimit: 3450, bestFor: 'Long-context documents, analysis', note: '3× usage promo through April 27' },
      { id: 'kimi-k2.5', name: 'Kimi K2.5', provider: 'Moonshot', category: 'Chat', freeLimit: null, goLimit: null, bestFor: 'Long-context writing, reasoning', note: 'Included in Go; limit not shown on pricing page' },
      { id: 'mimo-v2-pro', name: 'MiMo-V2-Pro', provider: 'Xiaomi', category: 'Coding', freeLimit: null, goLimit: null, bestFor: 'Agentic coding workflows', note: 'Included in Go; limit not shown on pricing page' },
      { id: 'mimo-v2-omni', name: 'MiMo-V2-Omni', provider: 'Xiaomi', category: 'Coding', freeLimit: null, goLimit: null, bestFor: 'Multi-file coding, refactoring', note: 'Included in Go; limit not shown on pricing page' },
      { id: 'mimo-v2.5-pro', name: 'MiMo-V2.5-Pro', provider: 'Xiaomi', category: 'Coding', freeLimit: null, goLimit: 1290, bestFor: 'Advanced coding, debugging', note: null },
      { id: 'mimo-v2.5', name: 'MiMo-V2.5', provider: 'Xiaomi', category: 'Coding', freeLimit: null, goLimit: null, bestFor: 'General coding tasks', note: 'Included in Go; limit not shown on pricing page' },
      { id: 'qwen3.6-plus', name: 'Qwen3.6 Plus', provider: 'Alibaba', category: 'Chat', freeLimit: null, goLimit: 3300, bestFor: 'Multilingual chat, tool use', note: null },
      { id: 'qwen3.5-plus', name: 'Qwen3.5 Plus', provider: 'Alibaba', category: 'Chat', freeLimit: null, goLimit: 10200, bestFor: 'High-volume chat, agents', note: null },
      { id: 'minimax-m2.7', name: 'MiniMax M2.7', provider: 'MiniMax', category: 'Chat', freeLimit: null, goLimit: 3400, bestFor: 'Creative writing, conversation', note: null },
      { id: 'minimax-m2.5', name: 'MiniMax M2.5', provider: 'MiniMax', category: 'Chat', freeLimit: null, goLimit: null, bestFor: 'General chat, voice', note: 'Included in Go; limit not shown on pricing page' },
      { id: 'deepseek-v4-pro', name: 'DeepSeek V4 Pro', provider: 'DeepSeek', category: 'Coding', freeLimit: null, goLimit: 3450, bestFor: 'Complex coding, math, reasoning', note: null },
      { id: 'deepseek-v4-flash', name: 'DeepSeek V4 Flash', provider: 'DeepSeek', category: 'Coding', freeLimit: null, goLimit: 31650, bestFor: 'Fast, high-volume coding', note: null },
    ];

    const PROVIDERS = [...new Set(MODELS.map(m => m.provider))];
    const CATEGORIES = [...new Set(MODELS.map(m => m.category))];

    function formatNum(n) {
      if (n == null) return '—';
      return n.toLocaleString();
    }

    function BarChart({ data, label }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); }
        const ctx = canvasRef.current.getContext('2d');
        chartRef.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: data.map(d => d.name),
            datasets: [{
              label,
              data: data.map(d => d.value),
              backgroundColor: data.map(d => d.color || '#6366f1'),
              borderRadius: 6,
              borderSkipped: false,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: (context) => `${context.parsed.y.toLocaleString()} requests / 5h`
                }
              }
            },
            scales: {
              x: { ticks: { color: '#a0a0a0' }, grid: { display: false } },
              y: { ticks: { color: '#a0a0a0' }, grid: { color: '#2a2a2a' }, beginAtZero: true }
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [data, label]);

      return <div className="chart-wrap"><canvas ref={canvasRef} /></div>;
    }

    function DoughnutChart({ data }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) chartRef.current.destroy();
        const ctx = canvasRef.current.getContext('2d');
        chartRef.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: data.map(d => d.name),
            datasets: [{
              data: data.map(d => d.value),
              backgroundColor: data.map(d => d.color),
              borderWidth: 0,
              hoverOffset: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            plugins: {
              legend: { position: 'right', labels: { color: '#e8e8e8', padding: 16, usePointStyle: true, pointStyle: 'circle' } }
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [data]);
      return <div className="chart-wrap"><canvas ref={canvasRef} /></div>;
    }

    function App() {
      const [search, setSearch] = useState('');
      const [provider, setProvider] = useState('All');
      const [category, setCategory] = useState('All');
      const [showOnlyWithLimits, setShowOnlyWithLimits] = useState(false);
      const [multiplier, setMultiplier] = useState(1);

      const filtered = useMemo(() => {
        return MODELS.filter(m => {
          const matchSearch = m.name.toLowerCase().includes(search.toLowerCase()) || m.provider.toLowerCase().includes(search.toLowerCase());
          const matchProvider = provider === 'All' || m.provider === provider;
          const matchCategory = category === 'All' || m.category === category;
          const matchLimits = showOnlyWithLimits ? (m.goLimit != null || m.freeLimit != null) : true;
          return matchSearch && matchProvider && matchCategory && matchLimits;
        });
      }, [search, provider, category, showOnlyWithLimits]);

      const modelsWithLimits = useMemo(() => filtered.filter(m => m.goLimit != null), [filtered]);

      const barData = useMemo(() => {
        return modelsWithLimits.map((m, i) => ({
          name: m.name,
          value: m.goLimit * multiplier,
          color: m.freeLimit ? '#f59e0b' : (m.note ? '#f43f5e' : '#6366f1')
        }));
      }, [modelsWithLimits, multiplier]);

      const doughnutData = useMemo(() => {
        const palette = ['#6366f1','#8b5cf6','#ec4899','#f43f5e','#f59e0b','#10b981','#06b6d4','#3b82f6','#a855f7'];
        return modelsWithLimits.map((m, i) => ({
          name: m.name,
          value: m.goLimit * multiplier,
          color: palette[i % palette.length]
        }));
      }, [modelsWithLimits, multiplier]);

      const bestValue = useMemo(() => {
        if (!modelsWithLimits.length) return null;
        // approximate "requests per dollar" using base $10/mo; this is illustrative
        const perDollar = modelsWithLimits.map(m => ({
          ...m,
          value: Math.round((m.goLimit * multiplier) / 10)
        })).sort((a, b) => b.value - a.value);
        return perDollar[0];
      }, [modelsWithLimits, multiplier]);

      const highestLimit = useMemo(() => {
        if (!modelsWithLimits.length) return null;
        return modelsWithLimits.reduce((max, m) => (m.goLimit * multiplier > max.goLimit * multiplier ? m : max), modelsWithLimits[0]);
      }, [modelsWithLimits, multiplier]);

      return (
        <div className="container">
          <header>
            <h1>OpenCode Go — Model Comparison</h1>
            <p className="lead">
              Compare request limits across all models available to Go subscribers. 
              Data sourced from <a href="https://opencode.ai/go" target="_blank" rel="noreferrer" style={{ color: 'var(--accent)' }}>opencode.ai/go</a>.
            </p>
          </header>

          <div className="stat-grid">
            <div className="stat">
              <div className="stat-value" style={{ color: 'var(--go)' }}>{MODELS.filter(m => m.goLimit != null).length}</div>
              <div className="stat-label">Models with known Go limits</div>
            </div>
            <div className="stat">
              <div className="stat-value" style={{ color: 'var(--accent)' }}>{formatNum(highestLimit ? highestLimit.goLimit * multiplier : null)}</div>
              <div className="stat-label">Highest limit ({highestLimit?.name})</div>
            </div>
            <div className="stat">
              <div className="stat-value" style={{ color: 'var(--accent-2)' }}>{formatNum(bestValue ? bestValue.goLimit * multiplier : null)}</div>
              <div className="stat-label">Best value model ({bestValue?.name})</div>
              <div className="note">~{formatNum(bestValue ? bestValue.value : null)} req/$ at $10/mo</div>
            </div>
            <div className="stat">
              <div className="stat-value" style={{ color: 'var(--free)' }}>200</div>
              <div className="stat-label">Free tier limit (Big Pickle)</div>
            </div>
          </div>

          <div className="toolbar">
            <input
              type="text"
              placeholder="Search models or providers..."
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
            <select value={provider} onChange={e => setProvider(e.target.value)}>
              <option value="All">All providers</option>
              {PROVIDERS.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
            <select value={category} onChange={e => setCategory(e.target.value)}>
              <option value="All">All categories</option>
              {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <label>
              <input type="checkbox" checked={showOnlyWithLimits} onChange={e => setShowOnlyWithLimits(e.target.checked)} />
              Only show models with known limits
            </label>
          </div>

          <div className="card">
            <h2>Request Limit Multiplier</h2>
            <div className="multiplier-control">
              <span>Go base limits are shown at 1×. Select a multiplier to see scaled limits:</span>
              {MULTIPLIERS.map(m => (
                <button key={m} className={`chip ${multiplier === m ? 'active' : ''}`} onClick={() => setMultiplier(m)}>
                  {m}×
                </button>
              ))}
            </div>
            <p className="note">Go starts at $5 for the first month, then $10/month. Multipliers are purchasable top-ups.</p>
          </div>

          <div className="charts-grid">
            <div className="card">
              <h2>Requests per 5 Hours (Go {multiplier}×)</h2>
              <BarChart data={barData} label={`Go ${multiplier}×`} />
            </div>
            <div className="card">
              <h2>Limit Share by Model (Go {multiplier}×)</h2>
              <DoughnutChart data={doughnutData} />
            </div>
          </div>

          <div className="card">
            <h2>Model Details</h2>
            <div style={{ overflowX: 'auto' }}>
              <table>
                <thead>
                  <tr>
                    <th>Model</th>
                    <th>Provider</th>
                    <th>Category</th>
                    <th>Best For</th>
                    <th>Free Limit</th>
                    <th>Go Limit ({multiplier}×)</th>
                    <th>Note</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(m => {
                    const goVal = m.goLimit != null ? m.goLimit * multiplier : null;
                    return (
                      <tr key={m.id}>
                        <td>
                          <div className="model-name">{m.name}</div>
                        </td>
                        <td className="provider">{m.provider}</td>
                        <td><span className="badge badge-go">{m.category}</span></td>
                        <td style={{ fontSize: '0.85rem', color: 'var(--text-2)' }}>{m.bestFor}</td>
                        <td className="limit-cell">
                          {m.freeLimit ? <span style={{ color: 'var(--free)', fontWeight: 600 }}>{formatNum(m.freeLimit)}</span> : '—'}
                        </td>
                        <td className="limit-cell">
                          {goVal != null ? <span style={{ color: 'var(--go)', fontWeight: 600 }}>{formatNum(goVal)}</span> : '—'}
                        </td>
                        <td style={{ fontSize: '0.85rem', color: 'var(--text-2)', maxWidth: 280 }}>
                          {m.note && <span className="badge badge-promo" style={{ marginRight: 8 }}>Promo</span>}
                          {m.note || ''}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {filtered.length === 0 && <p className="note" style={{ textAlign: 'center', padding: 24 }}>No models match your filters.</p>}
          </div>

          <div className="card">
            <h2>How to Read This Data</h2>
            <ul style={{ color: 'var(--text-2)', paddingLeft: 20 }}>
              <li><strong>Requests per 5 hours:</strong> The number of API requests you can make within a 5-hour rolling window.</li>
              <li><strong>Free tier:</strong> Gives you 200 requests per 5h, usable with Big Pickle and other free models.</li>
              <li><strong>Go ($10/mo):</strong> Unlocks premium models with individually defined limits. Some models have temporary promotional multipliers (e.g., Kimi K2.6 currently gets 3× its normal limit).</li>
              <li><strong>Multipliers (1×–100×):</strong> Purchasable top-ups that scale your limits. The chart lets you preview what each tier looks like.</li>
              <li><strong>Models without shown limits:</strong> Several models (GLM-5, Kimi K2.5, MiMo-V2 variants, MiniMax M2.5) are included in Go but their exact per-model limits are not displayed on the public pricing page.</li>
            </ul>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
