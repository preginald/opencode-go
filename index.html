<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCode Go — Model Comparison</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-2: #242424;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-2: #a0a0a0;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --free: #f59e0b;
      --go: #10b981;
      --promo: #f43f5e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    header { margin-bottom: 32px; }
    h1 { font-size: 2rem; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
    p.lead { color: var(--text-2); margin: 0 0 24px; font-size: 1.05rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .card h2 { font-size: 1.15rem; font-weight: 600; margin: 0 0 16px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 999px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2);
      user-select: none; transition: all .15s ease;
    }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 10px 12px; text-align: left; }
    th { color: var(--text-2); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { border-bottom: 1px solid var(--border); }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .model-name { font-weight: 600; }
    .provider { color: var(--text-2); font-size: 0.8rem; }
    .limit-cell { font-variant-numeric: tabular-nums; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600;
    }
    .badge-free { background: rgba(245,158,11,0.15); color: var(--free); }
    .badge-go { background: rgba(16,185,129,0.15); color: var(--go); }
    .badge-promo { background: rgba(244,63,94,0.15); color: var(--promo); }
    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 500;
      background: rgba(99,102,241,0.12);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.25);
      white-space: nowrap;
    }
    .table-filters {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .table-filters input, .table-filters select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
    }
    .table-filters input:focus, .table-filters select:focus { border-color: var(--accent); }
    .table-filters label { color: var(--text-2); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    th.sortable {
      cursor: pointer;
      user-select: none;
      transition: color .15s ease;
    }
    th.sortable:hover { color: var(--text); }
    th.sortable .sort-indicator {
      display: inline-block;
      width: 16px;
      text-align: center;
      margin-left: 4px;
      font-size: 0.7rem;
      opacity: 0.5;
    }
    th.sortable.active .sort-indicator { opacity: 1; color: var(--accent); }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 24px; }
    .chart-wrap { position: relative; height: 320px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px;
    }
    .stat-value { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .stat-label { color: var(--text-2); font-size: 0.8rem; margin-top: 4px; }
    .note { color: var(--text-2); font-size: 0.85rem; margin-top: 8px; }
    .token-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .token-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 6px; font-size: 0.7rem;
      background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border);
    }
    .token-pill strong { color: var(--text); font-weight: 600; }
    .period-toggle {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .endpoint {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.72rem;
      color: var(--text-2);
      background: var(--surface-2);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    @media (max-width: 640px) {
      .charts-grid { grid-template-columns: 1fr; }
      table { font-size: 0.8rem; }
      th, td { padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const MULTIPLIERS = [1, 5, 10, 25, 50, 100];
    const PERIODS = [
      { key: '5h', label: '5 hours', dollar: 12 },
      { key: 'week', label: 'Week', dollar: 30 },
      { key: 'month', label: 'Month', dollar: 60 },
    ];

    const MODELS = [
      { id: 'big-pickle', name: 'Big Pickle', provider: 'OpenCode', category: 'Free', modelId: 'big-pickle', freeLimit: 200, limits: { '5h': null, week: null, month: null }, tokens: null, bestFor: 'General coding assistance', endpoint: null, sdk: null, note: null },
      { id: 'glm-5.1', name: 'GLM-5.1', provider: 'Zhipu AI', category: 'Chat', modelId: 'glm-5.1', freeLimit: null, limits: { '5h': 880, week: 2150, month: 4300 }, tokens: { input: 700, cached: 52000, output: 150 }, bestFor: 'Reasoning, Chinese language tasks', endpoint: 'chat/completions', sdk: '@ai-sdk/openai-compatible', note: null },
      { id: 'glm-5', name: 'GLM-5', provider: 'Zhipu AI', category: 'Chat', modelId: 'glm-5', freeLimit: null, limits: { '5h': 1150, week: 2880, month: 5750 }, tokens: { input: 700, cached: 52000, output: 150 }, bestFor: 'General chat, multilingual reasoning', endpoint: 'chat/completions', sdk: '@ai-sdk/openai-compatible', note: null },
      { id: 'kimi-k2.6', name: 'Kimi K2.6', provider: 'Moonshot', category: 'Chat', modelId: 'kimi-k2.6', freeLimit: null, limits: { '5h': 1150, week: 2880, month: 5750 }, tokens: { input: 870, cached: 55000, output: 200 }, bestFor: 'Long-context documents, analysis', endpoint: 'chat/completions', sdk: '@ai-sdk/openai-compatible', note: '3× usage promo through April 27' },
      { id: 'kimi-k2.5', name: 'Kimi K2.5', provider: 'Moonshot', category: 'Chat', modelId: 'kimi-k2.5', freeLimit: null, limits: { '5h': 1850, week: 4630, month: 9250 }, tokens: { input: 870, cached: 55000, output: 200 }, bestFor: 'Long-context writing, reasoning', endpoint: 'chat/completions', sdk: '@ai-sdk/openai-compatible', note: null },
      { id: 'mimo-v2-pro', name: 'MiMo-V2-Pro', provider: 'Xiaomi', category: 'Coding', modelId: 'mimo-v2-pro', freeLimit: null, limits: { '5h': 1290, week: 3225, month: 6450 }, tokens: { input: 350, cached: 41000, output: 250 }, bestFor: 'Agentic coding workflows', endpoint: 'chat/completions', sdk: '@ai-sdk/openai-compatible', note: null },
      { id: 'mimo-v2-omni', name: 'MiMo-V2-Omni', provider: 'Xiaomi', category: 'Coding', modelId: 'mimo-v2-omni', freeLimit: null, limits: { '5h': 2150, week: 5450, month: 10900 }, tokens: { input: 1000, cached: 60000, output: 140 }, bestFor: 'Multi-file coding, refactoring', endpoint: 'chat/completions', sdk: '@ai-sdk/openai-compatible', note: null },
      { id: 'mimo-v2.5-pro', name: 'MiMo-V2.5-Pro', provider: 'Xiaomi', category: 'Coding', modelId: 'mimo-v2.5-pro', freeLimit: null, limits: { '5h': 1290, week: 3225, month: 6450 }, tokens: { input: 350, cached: 41000, output: 250 }, bestFor: 'Advanced coding, debugging', endpoint: 'chat/completions', sdk: '@ai-sdk/openai-compatible', note: null },
      { id: 'mimo-v2.5', name: 'MiMo-V2.5', provider: 'Xiaomi', category: 'Coding', modelId: 'mimo-v2.5', freeLimit: null, limits: { '5h': 2150, week: 5450, month: 10900 }, tokens: { input: 1000, cached: 60000, output: 140 }, bestFor: 'General coding tasks', endpoint: 'chat/completions', sdk: '@ai-sdk/openai-compatible', note: '≤ 256K context window' },
      { id: 'qwen3.6-plus', name: 'Qwen3.6 Plus', provider: 'Alibaba', category: 'Chat', modelId: 'qwen3.6-plus', freeLimit: null, limits: { '5h': 3300, week: 8200, month: 16300 }, tokens: { input: 500, cached: 57000, output: 190 }, bestFor: 'Multilingual chat, tool use', endpoint: 'chat/completions', sdk: '@ai-sdk/alibaba', note: null },
      { id: 'qwen3.5-plus', name: 'Qwen3.5 Plus', provider: 'Alibaba', category: 'Chat', modelId: 'qwen3.5-plus', freeLimit: null, limits: { '5h': 10200, week: 25200, month: 50500 }, tokens: { input: 410, cached: 47000, output: 140 }, bestFor: 'High-volume chat, agents', endpoint: 'chat/completions', sdk: '@ai-sdk/alibaba', note: null },
      { id: 'minimax-m2.7', name: 'MiniMax M2.7', provider: 'MiniMax', category: 'Chat', modelId: 'minimax-m2.7', freeLimit: null, limits: { '5h': 3400, week: 8500, month: 17000 }, tokens: { input: 300, cached: 55000, output: 125 }, bestFor: 'Creative writing, conversation', endpoint: 'messages', sdk: '@ai-sdk/anthropic', note: null },
      { id: 'minimax-m2.5', name: 'MiniMax M2.5', provider: 'MiniMax', category: 'Chat', modelId: 'minimax-m2.5', freeLimit: null, limits: { '5h': 6300, week: 15900, month: 31800 }, tokens: { input: 300, cached: 55000, output: 125 }, bestFor: 'General chat, voice', endpoint: 'messages', sdk: '@ai-sdk/anthropic', note: null },
      { id: 'deepseek-v4-pro', name: 'DeepSeek V4 Pro', provider: 'DeepSeek', category: 'Coding', modelId: 'deepseek-v4-pro', freeLimit: null, limits: { '5h': 3450, week: 8550, month: 17150 }, tokens: { input: 750, cached: 82000, output: 290 }, bestFor: 'Complex coding, math, reasoning', endpoint: 'chat/completions', sdk: '@ai-sdk/openai-compatible', note: null },
      { id: 'deepseek-v4-flash', name: 'DeepSeek V4 Flash', provider: 'DeepSeek', category: 'Coding', modelId: 'deepseek-v4-flash', freeLimit: null, limits: { '5h': 31650, week: 79050, month: 158150 }, tokens: { input: 790, cached: 68000, output: 280 }, bestFor: 'Fast, high-volume coding', endpoint: 'chat/completions', sdk: '@ai-sdk/openai-compatible', note: null },
    ];

    const PROVIDERS = [...new Set(MODELS.map(m => m.provider))];
    const CATEGORIES = [...new Set(MODELS.map(m => m.category))];
    const BEST_FOR_TAGS = [...new Set(MODELS.flatMap(m => m.bestFor.split(',').map(t => t.trim())))].sort();
    const ENDPOINTS = [...new Set(MODELS.map(m => m.endpoint).filter(Boolean))];
    const SDKS = [...new Set(MODELS.map(m => m.sdk).filter(Boolean))];

    function formatNum(n) {
      if (n == null) return '—';
      return n.toLocaleString();
    }

    function capitalize(s) {
      const t = s.trim();
      return t.charAt(0).toUpperCase() + t.slice(1);
    }

    function BarChart({ data, label, periodLabel }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); }
        const ctx = canvasRef.current.getContext('2d');
        chartRef.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: data.map(d => d.name),
            datasets: [{
              label,
              data: data.map(d => d.value),
              backgroundColor: data.map(d => d.color || '#6366f1'),
              borderRadius: 6,
              borderSkipped: false,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: (context) => `${context.parsed.y.toLocaleString()} requests / ${periodLabel}`
                }
              }
            },
            scales: {
              x: { ticks: { color: '#a0a0a0' }, grid: { display: false } },
              y: { ticks: { color: '#a0a0a0' }, grid: { color: '#2a2a2a' }, beginAtZero: true }
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [data, label, periodLabel]);

      return <div className="chart-wrap"><canvas ref={canvasRef} /></div>;
    }

    function DoughnutChart({ data }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) chartRef.current.destroy();
        const ctx = canvasRef.current.getContext('2d');
        chartRef.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: data.map(d => d.name),
            datasets: [{
              data: data.map(d => d.value),
              backgroundColor: data.map(d => d.color),
              borderWidth: 0,
              hoverOffset: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            plugins: {
              legend: { position: 'right', labels: { color: '#e8e8e8', padding: 16, usePointStyle: true, pointStyle: 'circle' } }
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [data]);
      return <div className="chart-wrap"><canvas ref={canvasRef} /></div>;
    }

    function App() {
      const [search, setSearch] = useState('');
      const [provider, setProvider] = useState('All');
      const [category, setCategory] = useState('All');
      const [bestForTag, setBestForTag] = useState('All');
      const [endpointFilter, setEndpointFilter] = useState('All');
      const [sdkFilter, setSdkFilter] = useState('All');
      const [showOnlyWithLimits, setShowOnlyWithLimits] = useState(false);
      const [multiplier, setMultiplier] = useState(1);
      const [period, setPeriod] = useState('5h');
      const [sort, setSort] = useState({ key: 'name', dir: 'asc' });

      const filtered = useMemo(() => {
        let data = MODELS.filter(m => {
          const matchSearch = m.name.toLowerCase().includes(search.toLowerCase()) || m.provider.toLowerCase().includes(search.toLowerCase()) || (m.modelId && m.modelId.toLowerCase().includes(search.toLowerCase()));
          const matchProvider = provider === 'All' || m.provider === provider;
          const matchCategory = category === 'All' || m.category === category;
          const matchBestFor = bestForTag === 'All' || m.bestFor.toLowerCase().includes(bestForTag.toLowerCase());
          const matchEndpoint = endpointFilter === 'All' || m.endpoint === endpointFilter;
          const matchSdk = sdkFilter === 'All' || m.sdk === sdkFilter;
          const matchLimits = showOnlyWithLimits ? (m.limits[period] != null || m.freeLimit != null) : true;
          return matchSearch && matchProvider && matchCategory && matchBestFor && matchEndpoint && matchSdk && matchLimits;
        });
        data.sort((a, b) => {
          let av, bv;
          if (sort.key === 'limit') { av = a.limits[period] ?? -1; bv = b.limits[period] ?? -1; }
          else if (sort.key === 'freeLimit') { av = a.freeLimit ?? -1; bv = b.freeLimit ?? -1; }
          else { av = a[sort.key] ?? ''; bv = b[sort.key] ?? ''; }
          if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
          if (av < bv) return sort.dir === 'asc' ? -1 : 1;
          if (av > bv) return sort.dir === 'asc' ? 1 : -1;
          return 0;
        });
        return data;
      }, [search, provider, category, bestForTag, endpointFilter, sdkFilter, showOnlyWithLimits, period, sort]);

      function toggleSort(key) {
        setSort(prev => ({ key, dir: prev.key === key && prev.dir === 'asc' ? 'desc' : 'asc' }));
      }

      function SortHeader({ label, sortKey }) {
        const active = sort.key === sortKey;
        const indicator = active ? (sort.dir === 'asc' ? '▲' : '▼') : '⇅';
        return (
          <th className={`sortable ${active ? 'active' : ''}`} onClick={() => toggleSort(sortKey)}>
            {label}<span className="sort-indicator">{indicator}</span>
          </th>
        );
      }

      const modelsWithLimits = useMemo(() => filtered.filter(m => m.limits[period] != null), [filtered, period]);

      const barData = useMemo(() => {
        return modelsWithLimits.map((m, i) => ({
          name: m.name,
          value: (m.limits[period] || 0) * multiplier,
          color: m.freeLimit ? '#f59e0b' : (m.note ? '#f43f5e' : '#6366f1')
        }));
      }, [modelsWithLimits, multiplier, period]);

      const doughnutData = useMemo(() => {
        const palette = ['#6366f1','#8b5cf6','#ec4899','#f43f5e','#f59e0b','#10b981','#06b6d4','#3b82f6','#a855f7'];
        return modelsWithLimits.map((m, i) => ({
          name: m.name,
          value: (m.limits[period] || 0) * multiplier,
          color: palette[i % palette.length]
        }));
      }, [modelsWithLimits, multiplier, period]);

      const bestValue = useMemo(() => {
        if (!modelsWithLimits.length) return null;
        const perDollar = modelsWithLimits.map(m => ({
          ...m,
          value: Math.round(((m.limits[period] || 0) * multiplier) / 10)
        })).sort((a, b) => b.value - a.value);
        return perDollar[0];
      }, [modelsWithLimits, multiplier, period]);

      const highestLimit = useMemo(() => {
        if (!modelsWithLimits.length) return null;
        return modelsWithLimits.reduce((max, m) => (((m.limits[period] || 0) * multiplier) > ((max.limits[period] || 0) * multiplier) ? m : max), modelsWithLimits[0]);
      }, [modelsWithLimits, multiplier, period]);

      const periodInfo = PERIODS.find(p => p.key === period);

      return (
        <div className="container">
          <header>
            <h1>OpenCode Go — Model Comparison</h1>
            <p className="lead">
              Compare request limits, token estimates, and endpoints across all models available to Go subscribers. 
              Data sourced from <a href="https://opencode.ai/docs/go/" target="_blank" rel="noreferrer" style={{ color: 'var(--accent)' }}>opencode.ai/docs/go</a>.
            </p>
          </header>

          <div className="stat-grid">
            <div className="stat">
              <div className="stat-value" style={{ color: 'var(--go)' }}>{MODELS.filter(m => m.limits['5h'] != null).length}</div>
              <div className="stat-label">Models available on Go</div>
            </div>
            <div className="stat">
              <div className="stat-value" style={{ color: 'var(--accent)' }}>{formatNum(highestLimit ? (highestLimit.limits[period] || 0) * multiplier : null)}</div>
              <div className="stat-label">Highest limit ({highestLimit?.name})</div>
              <div className="note">per {periodInfo?.label.toLowerCase()}</div>
            </div>
            <div className="stat">
              <div className="stat-value" style={{ color: 'var(--accent-2)' }}>{formatNum(bestValue ? (bestValue.limits[period] || 0) * multiplier : null)}</div>
              <div className="stat-label">Best value model ({bestValue?.name})</div>
              <div className="note">~{formatNum(bestValue ? bestValue.value : null)} req/$ at $10/mo</div>
            </div>
            <div className="stat">
              <div className="stat-value" style={{ color: 'var(--free)' }}>200</div>
              <div className="stat-label">Free tier limit</div>
              <div className="note">Big Pickle + free models</div>
            </div>
            <div className="stat">
              <div className="stat-value" style={{ color: 'var(--go)' }}>${periodInfo?.dollar}</div>
              <div className="stat-label">Dollar limit</div>
              <div className="note">per {periodInfo?.label.toLowerCase()}</div>
            </div>
          </div>

          <div className="card">
            <h2>Time Period & Multiplier</h2>
            <div style={{ marginBottom: 16 }}>
              <div style={{ color: 'var(--text-2)', fontSize: '0.9rem', marginBottom: 8 }}>Limits are dollar-based. Select a period to see estimated requests:</div>
              <div className="period-toggle">
                {PERIODS.map(p => (
                  <button key={p.key} className={`chip ${period === p.key ? 'active' : ''}`} onClick={() => setPeriod(p.key)}>
                    {p.label} (${p.dollar})
                  </button>
                ))}
              </div>
            </div>
            <div className="multiplier-control" style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
              <span style={{ color: 'var(--text-2)', fontSize: '0.9rem' }}>Multiplier:</span>
              {MULTIPLIERS.map(m => (
                <button key={m} className={`chip ${multiplier === m ? 'active' : ''}`} onClick={() => setMultiplier(m)}>
                  {m}×
                </button>
              ))}
            </div>
            <p className="note">Go starts at $5 for the first month, then $10/month. Multipliers are purchasable top-ups. Limits may change as usage patterns evolve.</p>
          </div>

          <div className="charts-grid">
            <div className="card">
              <h2>Requests per {periodInfo?.label} (Go {multiplier}×)</h2>
              <BarChart data={barData} label={`Go ${multiplier}×`} periodLabel={periodInfo?.label} />
            </div>
            <div className="card">
              <h2>Limit Share by Model (Go {multiplier}×)</h2>
              <DoughnutChart data={doughnutData} />
            </div>
          </div>

          <div className="card">
            <h2>Model Details</h2>
            <div className="table-filters">
              <input
                type="text"
                placeholder="Search models, providers, IDs..."
                value={search}
                onChange={e => setSearch(e.target.value)}
                style={{ minWidth: 180 }}
              />
              <select value={provider} onChange={e => setProvider(e.target.value)}>
                <option value="All">All providers</option>
                {PROVIDERS.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
              <select value={category} onChange={e => setCategory(e.target.value)}>
                <option value="All">All categories</option>
                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <select value={bestForTag} onChange={e => setBestForTag(e.target.value)}>
                <option value="All">All use cases</option>
                {BEST_FOR_TAGS.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              <select value={endpointFilter} onChange={e => setEndpointFilter(e.target.value)}>
                <option value="All">All endpoints</option>
                {ENDPOINTS.map(e => <option key={e} value={e}>{e}</option>)}
              </select>
              <select value={sdkFilter} onChange={e => setSdkFilter(e.target.value)}>
                <option value="All">All SDKs</option>
                {SDKS.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
              <label>
                <input type="checkbox" checked={showOnlyWithLimits} onChange={e => setShowOnlyWithLimits(e.target.checked)} />
                Known limits only
              </label>
            </div>
            <div style={{ overflowX: 'auto' }}>
              <table>
                <thead>
                  <tr>
                    <SortHeader label="Model" sortKey="name" />
                    <SortHeader label="Provider" sortKey="provider" />
                    <SortHeader label="Category" sortKey="category" />
                    <SortHeader label="Best For" sortKey="bestFor" />
                    <th>Tokens / req</th>
                    <SortHeader label={`Limit (${periodInfo?.label})`} sortKey="limit" />
                    <SortHeader label="Free Limit" sortKey="freeLimit" />
                    <th>Config ID</th>
                    <th>Endpoint</th>
                    <th>Note</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(m => {
                    const limitVal = m.limits[period] != null ? (m.limits[period] || 0) * multiplier : null;
                    return (
                      <tr key={m.id}>
                        <td>
                          <div className="model-name">{m.name}</div>
                        </td>
                        <td className="provider">{m.provider}</td>
                        <td><span className="badge badge-go">{m.category}</span></td>
                        <td>
                          {m.bestFor.split(',').map((tag, i) => (
                            <span key={i} className="pill" style={{ marginRight: 4, marginBottom: 3, display: 'inline-block' }}>
                              {capitalize(tag)}
                            </span>
                          ))}
                        </td>
                        <td>
                          {m.tokens ? (
                            <div className="token-row">
                              <span className="token-pill"><strong>{formatNum(m.tokens.input)}</strong> in</span>
                              <span className="token-pill"><strong>{formatNum(m.tokens.cached)}</strong> cache</span>
                              <span className="token-pill"><strong>{formatNum(m.tokens.output)}</strong> out</span>
                            </div>
                          ) : '—'}
                        </td>
                        <td className="limit-cell">
                          {limitVal != null ? <span style={{ color: 'var(--go)', fontWeight: 600 }}>{formatNum(limitVal)}</span> : '—'}
                        </td>
                        <td className="limit-cell">
                          {m.freeLimit ? <span style={{ color: 'var(--free)', fontWeight: 600 }}>{formatNum(m.freeLimit)}</span> : '—'}
                        </td>
                        <td>
                          {m.modelId ? <span className="endpoint">{m.modelId}</span> : '—'}
                        </td>
                        <td>
                          {m.endpoint ? <span className="endpoint">{m.endpoint}</span> : '—'}
                          {m.sdk && <div style={{ fontSize: '0.7rem', color: 'var(--text-2)', marginTop: 2 }}>{m.sdk}</div>}
                        </td>
                        <td style={{ fontSize: '0.8rem', color: 'var(--text-2)', maxWidth: 200 }}>
                          {m.note && <span className="badge badge-promo" style={{ marginRight: 6, marginBottom: 4, display: 'inline-block' }}>Promo</span>}
                          {m.note || ''}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {filtered.length === 0 && <p className="note" style={{ textAlign: 'center', padding: 24 }}>No models match your filters.</p>}
          </div>

          <div className="card">
            <h2>How to Read This Data</h2>
            <ul style={{ color: 'var(--text-2)', paddingLeft: 20 }}>
              <li><strong>Dollar-based limits:</strong> Go limits are defined in dollar value ($12 per 5 hours, $30 per week, $60 per month). The request counts shown are estimates based on observed average usage patterns.</li>
              <li><strong>Token estimates:</strong> Input, cached, and output tokens per request are averages from real usage data. Cheaper models (fewer tokens, lower cost) allow more requests within the dollar limit.</li>
              <li><strong>Free tier:</strong> Gives you 200 requests per 5h, usable with Big Pickle and other free models.</li>
              <li><strong>Multipliers (1×–100×):</strong> Purchasable top-ups that scale your dollar limits. The charts let you preview what each tier looks like.</li>
              <li><strong>Config ID:</strong> Use <code style={{ background: 'var(--surface-2)', padding: '2px 6px', borderRadius: 4 }}>opencode-go/&#123;model-id&#125;</code> in your OpenCode config.</li>
              <li><strong>Endpoints:</strong> Most models use OpenAI-compatible <code style={{ background: 'var(--surface-2)', padding: '2px 6px', borderRadius: 4 }}>/chat/completions</code>. MiniMax uses Anthropic-compatible <code style={{ background: 'var(--surface-2)', padding: '2px 6px', borderRadius: 4 }}>/messages</code>.</li>
              <li><strong>Zen balance fallback:</strong> If you reach your Go limit, you can enable "Use balance" in the console to fall back to Zen credits instead of blocking requests.</li>
              <li><strong>Privacy:</strong> Models are hosted in the US, EU, and Singapore. Providers follow a zero-retention policy and do not use your data for training.</li>
            </ul>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
